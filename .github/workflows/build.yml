name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  create:
    branches: [master]
    tags: ['**']


jobs:

  # Build source distribution
  build-sdist:

    name: Build sdist for unsupported platforms
    runs-on: ubuntu-latest
    container: python:3.11
    
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        run: |
          python3 -m pip install setuptools build
          python3 -m build -s

      - name: Install and run tests
        run: |
          python3 -m pip install -U --force-reinstall ./dist/pysdl2_dll*.tar.gz
          python3 -m pip install pytest git+https://github.com/py-sdl/py-sdl2.git
          pytest -v -rP

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz


  # Build macOS wheels
  build-macos:

    name: Build macOS (x86_64 & ARM64) wheels
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Build wheels
        run: |
          python3 -m pip install -U setuptools build wheel
          python3 -m build -w
          python3 fix_wheels.py

      - name: Install and run tests
        run: |
          python3 -m pip install -U --force-reinstall --no-index --find-links=./dist pysdl2-dll
          python3 -m pip install pytest git+https://github.com/py-sdl/py-sdl2.git
          pytest -v -rP

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-wheels
          path: dist/*.whl


  # Build 64-bit x86 manylinux wheels
  build-manylinux-x86_64:

    name: Build ${{ matrix.platform }} (x86_64) wheel
    runs-on: ubuntu-24.04
#    container: quay.io/pypa/${{ matrix.platform }}_x86_64

    strategy:
      fail-fast: false
      matrix:
        platform: ['manylinux2014']

    env:
      SDL2DLL_PLATFORM: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Build and test manylinux wheels
        uses: maus007/docker-run-action-fork@v1
        with:
          image: quay.io/pypa/${{ matrix.platform }}_x86_64
          options: -v ${{ github.workspace }}:/io
          run: ./manylinux.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manylinux-wheels
          path: dist/*.whl


